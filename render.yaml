services:
  - type: web
    name: naoto-todo-bot
    runtime: python
    rootDir: naoto-todo-bot
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: naoto-db
          property: connectionString

databases:
  - name: naoto-db
    plan: free
