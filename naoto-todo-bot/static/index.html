<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>直人さん専用 TODOボット</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
    background: #212121;
    color: #ececec;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "palt";
  }

  /* Navigation */
  nav {
    background: rgba(23, 23, 23, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid #2a2a2a;
    padding: 12px 20px;
    display: flex;
    gap: 4px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  nav a {
    color: #b4b4b4;
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.15s ease;
  }
  nav a:hover { background: #2a2a2a; color: #ececec; }
  nav a.active { background: #2f2f2f; color: #ececec; }

  .container { max-width: 820px; margin: 0 auto; padding: 32px 20px 80px; }
  .screen { display: none; }
  .screen.active { display: block; }
  h2 {
    margin: 0 0 24px;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  /* Buttons */
  button {
    background: #ececec;
    color: #171717;
    border: none;
    padding: 10px 18px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.15s ease;
    font-family: inherit;
  }
  button:hover:not(:disabled) { background: #fff; }
  button:disabled { background: #424242; color: #8e8e8e; cursor: not-allowed; }
  button.danger { background: rgba(239, 68, 68, 0.12); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
  button.danger:hover:not(:disabled) { background: rgba(239, 68, 68, 0.2); }
  button.success { background: #19c37d; color: #fff; }
  button.success:hover:not(:disabled) { background: #16a368; }
  button.ghost { background: transparent; color: #b4b4b4; border: 1px solid #424242; }
  button.ghost:hover:not(:disabled) { background: #2a2a2a; color: #ececec; }

  /* Inputs */
  textarea, input[type="text"], input[type="date"], select, input[type="file"] {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #424242;
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    background: #2f2f2f;
    color: #ececec;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }
  textarea:focus, input[type="text"]:focus, input[type="date"]:focus, select:focus {
    border-color: #6e6e6e;
    background: #353535;
  }
  textarea::placeholder, input::placeholder { color: #8e8e8e; }
  textarea { min-height: 110px; resize: vertical; line-height: 1.6; }
  input[type="file"] { padding: 10px 14px; background: #2a2a2a; }
  input[type="file"]::file-selector-button {
    background: #424242; color: #ececec; border: none;
    padding: 6px 12px; border-radius: 6px; margin-right: 10px;
    cursor: pointer; font-size: 13px;
  }

  /* Cards */
  .card {
    background: #2f2f2f;
    border: 1px solid #3a3a3a;
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 12px;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: #4a4a4a; }

  .label {
    font-size: 12px;
    color: #8e8e8e;
    margin-bottom: 8px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .preview {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    padding: 16px;
    border-radius: 10px;
    margin-top: 16px;
    white-space: pre-wrap;
    font-size: 13px;
    max-height: 360px;
    overflow-y: auto;
    color: #d4d4d4;
    line-height: 1.7;
  }

  /* Badges */
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
    margin-right: 6px;
    vertical-align: middle;
    letter-spacing: 0.02em;
  }
  .badge.high { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.25); }
  .badge.medium { background: rgba(245, 158, 11, 0.15); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.25); }
  .badge.low { background: rgba(148, 163, 184, 0.15); color: #cbd5e1; border: 1px solid rgba(148, 163, 184, 0.25); }
  .badge.done { background: rgba(25, 195, 125, 0.15); color: #4ade80; border: 1px solid rgba(25, 195, 125, 0.25); }
  .badge.pending { background: rgba(148, 163, 184, 0.15); color: #94a3b8; border: 1px solid rgba(148, 163, 184, 0.25); }
  .badge.in_progress { background: rgba(96, 165, 250, 0.15); color: #60a5fa; border: 1px solid rgba(96, 165, 250, 0.25); }

  /* Filters */
  .filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-btn {
    background: transparent;
    color: #b4b4b4;
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid #424242;
    font-size: 13px;
  }
  .filter-btn:hover:not(:disabled) { background: #2a2a2a; color: #ececec; }
  .filter-btn.active { background: #ececec; color: #171717; border-color: #ececec; }

  /* Modal */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 16px;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .modal.active { display: flex; }
  .modal-content {
    background: #2f2f2f;
    border: 1px solid #424242;
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 24px 48px rgba(0,0,0,0.4);
  }
  .modal-content h3 { margin: 0 0 8px; font-size: 18px; font-weight: 600; }

  /* Chat */
  .chat-history {
    background: transparent;
    padding: 8px 0;
    height: 60vh;
    overflow-y: auto;
    margin-bottom: 16px;
  }
  .chat-msg {
    margin-bottom: 22px;
    display: flex;
    flex-direction: column;
  }
  .chat-msg.user { align-items: flex-end; }
  .chat-msg.assistant { align-items: flex-start; }
  .chat-msg .bubble {
    display: inline-block;
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 18px;
    word-break: break-word;
    font-size: 14px;
    line-height: 1.65;
  }
  .chat-msg.user .bubble {
    background: #2f2f2f;
    color: #ececec;
    border-radius: 18px 18px 4px 18px;
  }
  .chat-msg.assistant .bubble {
    background: transparent;
    color: #ececec;
    padding: 0;
    max-width: 100%;
  }
  .sources { font-size: 11px; color: #8e8e8e; margin-top: 8px; }
  .sources span { display: inline-block; margin-right: 8px; padding: 2px 8px; background: #2a2a2a; border-radius: 6px; }

  /* Chat input row */
  .input-row {
    display: flex;
    gap: 8px;
    background: #2f2f2f;
    border: 1px solid #424242;
    border-radius: 28px;
    padding: 6px 6px 6px 18px;
    align-items: center;
    transition: border-color 0.15s;
  }
  .input-row:focus-within { border-color: #6e6e6e; }
  .input-row input {
    flex: 1;
    border: none;
    background: transparent;
    padding: 12px 4px;
  }
  .input-row input:focus { background: transparent; }
  .input-row button { border-radius: 22px; padding: 10px 20px; }

  .recording { background: #ef4444 !important; color: #fff !important; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }

  /* Layout helpers */
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .row > .grow { flex: 1; min-width: 200px; }
  .due { font-size: 12px; color: #8e8e8e; margin-top: 6px; }
  .completion-note {
    font-size: 12px;
    color: #4ade80;
    margin-top: 8px;
    background: rgba(25, 195, 125, 0.08);
    border: 1px solid rgba(25, 195, 125, 0.2);
    padding: 8px 10px;
    border-radius: 8px;
  }
  .done-row { opacity: 0.55; }
  .empty {
    text-align: center;
    color: #6e6e6e;
    padding: 60px 20px;
    font-size: 14px;
  }
  .stack { display: flex; flex-direction: column; gap: 10px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #424242; border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: #525252; background-clip: padding-box; }
</style>
</head>
<body>
<nav>
  <a href="#home" data-screen="home">🏠 ホーム</a>
  <a href="#todos" data-screen="todos">✅ TODO</a>
  <a href="#chat" data-screen="chat">💬 チャット</a>
</nav>

<div class="container">
  <!-- ホーム -->
  <section class="screen" id="screen-home">
    <h2>インプット</h2>
    <div class="card">
      <div class="label">音声録音</div>
      <div class="row">
        <button id="recordBtn">🎙️ 録音開始</button>
        <span id="recordStatus" style="font-size:12px; color:#7f8c8d;"></span>
      </div>
    </div>
    <div class="card">
      <div class="label">音声ファイル</div>
      <input type="file" id="audioFile" accept="audio/*">
    </div>
    <div class="card">
      <div class="label">PDF（任意・音声と同時送信）</div>
      <input type="file" id="pdfFile" accept="application/pdf">
    </div>
    <div class="card">
      <div class="label">テキストメモ</div>
      <textarea id="textInput" placeholder="メモやTODOになりそうな内容を自由に書いてください"></textarea>
    </div>
    <button id="submitBtn">📨 実行</button>
    <div id="result" class="preview" style="display:none;"></div>
  </section>

  <!-- TODO -->
  <section class="screen" id="screen-todos">
    <h2>TODO一覧</h2>
    <div class="filters">
      <button class="filter-btn active" data-filter="all">全て</button>
      <button class="filter-btn" data-filter="pending">未完了</button>
      <button class="filter-btn" data-filter="done">完了</button>
    </div>
    <div class="card">
      <div class="label">手動追加</div>
      <div class="stack">
        <input type="text" id="newTodoTitle" placeholder="タイトル">
        <div class="row">
          <select id="newTodoPriority" style="max-width:120px;">
            <option value="low">優先度: 低</option>
            <option value="medium" selected>優先度: 中</option>
            <option value="high">優先度: 高</option>
          </select>
          <input type="date" id="newTodoDue" style="max-width:200px;">
          <button id="addTodoBtn">追加</button>
        </div>
      </div>
    </div>
    <div id="todoList"></div>
  </section>

  <!-- チャット -->
  <section class="screen" id="screen-chat">
    <h2>チャット</h2>
    <div id="chatHistory" class="chat-history"></div>
    <div class="input-row">
      <input type="text" id="chatInput" placeholder="あの件どうだったっけ？">
      <button id="chatSendBtn">送信</button>
    </div>
  </section>
</div>

<!-- 完了モーダル -->
<div class="modal" id="completeModal">
  <div class="modal-content">
    <h3>完了報告</h3>
    <p id="completeTitle" style="color:#555; margin: 0 0 12px;"></p>
    <div class="label">どう終わった？（任意）</div>
    <textarea id="completionNote" placeholder="うまくいった点・つまずいた点・引き継ぎなど"></textarea>
    <div class="row" style="margin-top:14px; justify-content:flex-end;">
      <button class="ghost" id="cancelComplete">キャンセル</button>
      <button class="success" id="confirmComplete">完了を記録</button>
    </div>
  </div>
</div>

<script>
// ---------- ナビゲーション ----------
function showScreen(name) {
  if (!['home','todos','chat'].includes(name)) name = 'home';
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.querySelectorAll('nav a').forEach(a => a.classList.toggle('active', a.dataset.screen === name));
  if (name === 'todos') loadTodos();
}
window.addEventListener('hashchange', () => showScreen((location.hash || '#home').slice(1)));
document.querySelectorAll('nav a').forEach(a => {
  a.addEventListener('click', e => { e.preventDefault(); location.hash = '#' + a.dataset.screen; });
});

// ---------- 録音 ----------
let mediaRecorder = null;
let recordedChunks = [];
let recordedBlob = null;
const recordBtn = document.getElementById('recordBtn');
const recordStatus = document.getElementById('recordStatus');

recordBtn.addEventListener('click', async () => {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    recordedChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      recordedBlob = new Blob(recordedChunks, { type: 'audio/webm' });
      recordBtn.textContent = '🎙️ 録音開始';
      recordBtn.classList.remove('recording');
      recordStatus.textContent = `録音完了 (${(recordedBlob.size / 1024).toFixed(1)} KB)`;
      stream.getTracks().forEach(t => t.stop());
    };
    mediaRecorder.start();
    recordBtn.textContent = '⏹️ 停止';
    recordBtn.classList.add('recording');
    recordStatus.textContent = '録音中...';
  } catch (err) {
    alert('マイクへのアクセスに失敗しました: ' + err.message);
  }
});

// ---------- 送信（音声・テキスト） ----------
const submitBtn = document.getElementById('submitBtn');
submitBtn.addEventListener('click', async () => {
  const text = document.getElementById('textInput').value.trim();
  const audioFile = document.getElementById('audioFile').files[0];
  const pdfFile = document.getElementById('pdfFile').files[0];
  const result = document.getElementById('result');

  const audio = audioFile || (recordedBlob ? new File([recordedBlob], 'recording.webm', { type: 'audio/webm' }) : null);

  if (!audio && !text) {
    alert('音声・テキストのどちらか1つ以上を入力してください');
    return;
  }

  submitBtn.disabled = true;
  result.style.display = 'block';
  result.textContent = '処理中...（Geminiが文字起こし・TODO抽出・要約・ベクトル化を実行中）';

  try {
    const responses = [];
    if (audio) {
      const fd = new FormData();
      fd.append('file', audio);
      if (pdfFile) fd.append('pdf', pdfFile);
      const r = await fetch('/api/input/voice', { method: 'POST', body: fd });
      if (!r.ok) throw new Error('voice: ' + await r.text());
      responses.push(await r.json());
    }
    if (text) {
      const r = await fetch('/api/input/text', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });
      if (!r.ok) throw new Error('text: ' + await r.text());
      responses.push(await r.json());
    }

    const out = responses.map(r => {
      let s = '';
      if (r.transcription) s += '【文字起こし】\n' + r.transcription + '\n\n';
      if (r.summary) s += '【要約】\n' + r.summary + '\n\n';
      if (r.todos_created && r.todos_created.length) {
        s += '【抽出されたTODO】\n' + r.todos_created.map(t =>
          `・${t.title} [${t.priority}]${t.due_date ? ' / 期限: ' + t.due_date : ''}`
        ).join('\n');
      } else {
        s += '【TODOは抽出されませんでした】';
      }
      return s;
    }).join('\n\n========\n\n');
    result.textContent = out || '保存しました。';

    document.getElementById('textInput').value = '';
    document.getElementById('audioFile').value = '';
    document.getElementById('pdfFile').value = '';
    recordedBlob = null;
    recordStatus.textContent = '';
  } catch (e) {
    result.textContent = 'エラー: ' + e.message;
  } finally {
    submitBtn.disabled = false;
  }
});

// ---------- TODO一覧 ----------
let currentFilter = 'all';
document.querySelectorAll('.filter-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentFilter = b.dataset.filter;
    loadTodos();
  });
});

const PRIORITY_LABEL = { high: '高', medium: '中', low: '低' };
const STATUS_LABEL = { pending: '未完了', in_progress: '作業中', done: '完了' };

async function loadTodos() {
  const r = await fetch('/api/todos');
  let todos = await r.json();
  if (currentFilter === 'pending') todos = todos.filter(t => t.status !== 'done');
  else if (currentFilter === 'done') todos = todos.filter(t => t.status === 'done');

  const list = document.getElementById('todoList');
  if (!todos.length) {
    list.innerHTML = '<div class="empty">TODOはありません</div>';
    return;
  }
  list.innerHTML = todos.map(t => `
    <div class="card ${t.status === 'done' ? 'done-row' : ''}">
      <div class="row">
        <div class="grow">
          <span class="badge ${t.priority}">${PRIORITY_LABEL[t.priority] || t.priority}</span>
          <span class="badge ${t.status}">${STATUS_LABEL[t.status] || t.status}</span>
          <strong>${escapeHtml(t.title)}</strong>
          ${t.due_date ? `<div class="due">期限: ${t.due_date}</div>` : ''}
          ${t.completion_note ? `<div class="completion-note">完了メモ: ${escapeHtml(t.completion_note)}</div>` : ''}
        </div>
        <div class="row" style="gap:6px;">
          ${t.status !== 'done' ? `<button class="success" data-complete="${t.id}" data-title="${escapeAttr(t.title)}">完了</button>` : ''}
          <button class="danger" data-delete="${t.id}">削除</button>
        </div>
      </div>
    </div>
  `).join('');
  list.querySelectorAll('[data-complete]').forEach(b =>
    b.addEventListener('click', () => openCompleteModal(b.dataset.complete, b.dataset.title))
  );
  list.querySelectorAll('[data-delete]').forEach(b =>
    b.addEventListener('click', async () => {
      if (!confirm('削除しますか？')) return;
      await fetch('/api/todos/' + b.dataset.delete, { method: 'DELETE' });
      loadTodos();
    })
  );
}

document.getElementById('addTodoBtn').addEventListener('click', async () => {
  const title = document.getElementById('newTodoTitle').value.trim();
  if (!title) return;
  const priority = document.getElementById('newTodoPriority').value;
  const due = document.getElementById('newTodoDue').value || null;
  await fetch('/api/todos', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title, priority, due_date: due }),
  });
  document.getElementById('newTodoTitle').value = '';
  document.getElementById('newTodoDue').value = '';
  loadTodos();
});

// ---------- 完了モーダル ----------
let completingId = null;
function openCompleteModal(id, title) {
  completingId = id;
  document.getElementById('completeTitle').textContent = title;
  document.getElementById('completionNote').value = '';
  document.getElementById('completeModal').classList.add('active');
}
document.getElementById('cancelComplete').addEventListener('click', () => {
  document.getElementById('completeModal').classList.remove('active');
});
document.getElementById('confirmComplete').addEventListener('click', async () => {
  const note = document.getElementById('completionNote').value.trim();
  const btn = document.getElementById('confirmComplete');
  btn.disabled = true;
  try {
    await fetch('/api/todos/' + completingId + '/complete', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ completion_note: note || null }),
    });
    document.getElementById('completeModal').classList.remove('active');
    loadTodos();
  } finally {
    btn.disabled = false;
  }
});

// ---------- チャット ----------
const chatHistory = [];
const chatHistoryEl = document.getElementById('chatHistory');
const chatInput = document.getElementById('chatInput');
const chatSendBtn = document.getElementById('chatSendBtn');

function renderChat() {
  chatHistoryEl.innerHTML = chatHistory.map(m => `
    <div class="chat-msg ${m.role}">
      <div class="bubble">${escapeHtml(m.content).replace(/\n/g, '<br>')}</div>
      ${m.sources && m.sources.length ? `<div class="sources">参照: ${m.sources.map(s =>
        `<span>[${escapeHtml(s.type)}] ${escapeHtml((s.summary || '').slice(0, 40))}</span>`
      ).join('')}</div>` : ''}
    </div>
  `).join('');
  chatHistoryEl.scrollTop = chatHistoryEl.scrollHeight;
}

async function sendChat() {
  const msg = chatInput.value.trim();
  if (!msg) return;
  chatHistory.push({ role: 'user', content: msg });
  renderChat();
  chatInput.value = '';
  chatSendBtn.disabled = true;

  // 直近10ターン分（ユーザー+アシスタント）の履歴を、新しい質問の "前" まで送信
  const prior = chatHistory.slice(-21, -1).map(m => ({ role: m.role, content: m.content }));

  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, history: prior }),
    });
    if (!r.ok) throw new Error(await r.text());
    const data = await r.json();
    chatHistory.push({ role: 'assistant', content: data.answer, sources: data.sources });
    renderChat();
  } catch (e) {
    chatHistory.push({ role: 'assistant', content: 'エラー: ' + e.message });
    renderChat();
  } finally {
    chatSendBtn.disabled = false;
  }
}
chatSendBtn.addEventListener('click', sendChat);
chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });

// ---------- 共通 ----------
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function escapeAttr(s) { return escapeHtml(s); }
